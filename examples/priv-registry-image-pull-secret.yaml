# Exemple to create the secrets:
#
# kubectl create secret docker-registry my-secret-name \
#   --docker-server=ghcr.io
#   --docker-username=hackinsdn
#   --docker-password=ghp_aaabbb
#
# kubectl create secret docker-registry secret-for-docker-io \
#   --docker-server=docker.io
#   --docker-username=hackinsdn
#   --docker-password=dckr_pat_xyz
#
name: Example lab for using imagePullSecrets and images on private registry
hosts:
  h1:
    kind: k8spod
    image: ghcr.io/hackinsdn/test-priv:latest
    imagePullSecrets:
      - my-secret-name
  h2:
    kind: k8spod
    image: hackinsdn/debian:latest
    imagePullSecrets:
      - secret-for-docker-io
    img_url: /assets/debian-server.png
links:
  - node1: h1
    node2: h2
